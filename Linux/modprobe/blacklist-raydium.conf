# Disable the Raydium touchscreen driver. The hardware sends garbled i2c
# packets continuously, generating millions of CRC-error IRQs and burning
# CPU/fan even with the lid closed. `blacklist` alone wasn't enough because
# the driver still got bound via ACPI alias acpi:RAYD0001:; the `install`
# directive intercepts every load attempt and runs /bin/true instead.
install raydium_i2c_ts /bin/true
