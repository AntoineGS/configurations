# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows
    gaps_in = 4 
    gaps_out = 4 

    # Use master layout instead of dwindle
    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    rounding = 8

    blur {
        size = 5
        passes = 3
        brightness = 0.70
        contrast = 0.80
    }
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = vicinae
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Smooth bezier curves
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = softSnap, 0.2, 0.8, 0.2, 1
    bezier = gentleFade, 0.4, 0, 0.2, 1

    # Window open/close
    animation = windowsIn, 1, 5, overshot, popin 80%
    animation = windowsOut, 1, 4, smoothOut, popin 80%
    animation = windowsMove, 1, 4, softSnap

    # Fading
    animation = fadeIn, 1, 3, smoothIn
    animation = fadeOut, 1, 3, smoothOut
    animation = fadeSwitch, 1, 5, gentleFade
    animation = fadeDim, 1, 5, gentleFade

    # Border color transition
    animation = border, 1, 8, softSnap
    animation = borderangle, 1, 30, smoothIn, loop

    # Workspace switching (slide effect)
    animation = workspaces, 1, 5, overshot, slidevert

    # Special workspace (slides from top)
    animation = specialWorkspace, 1, 5, overshot, slidevert

    # Layers (waybar, notifications, etc.)
    animation = layers, 1, 4, softSnap, fade
    animation = fadeLayers, 1, 4, gentleFade
}

# Terminal transparency (controlled by Hyprland so SUPER+Backspace toggle works)
windowrule = opacity 0.90 1, match:tag terminal
