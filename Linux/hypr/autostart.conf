exec-once = uwsm-app -- hypridle
exec-once = uwsm-app -- mako
exec-once = uwsm-app -- waybar
exec-once = uwsm-app -- fcitx5 --disable notificationitem
exec-once = uwsm-app -- swaybg -i ~/.config/omarchy/current/background -m fill
exec-once = uwsm-app -- swayosd-server
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# Extra autostart processes
exec-once = hyprpm reload -n
exec-once = signal 
exec-once = teams-for-linux 
exec-once = vicinae server

# Ensure all persistent workspaces are on correct monitors (batch = atomic, moveworkspacetomonitor = explicit placement)
exec-once = sleep 1 && hyprctl --batch "dispatch moveworkspacetomonitor 1 DVI-D-1 ; dispatch moveworkspacetomonitor 4 DVI-D-1 ; dispatch moveworkspacetomonitor 7 DVI-D-1 ; dispatch moveworkspacetomonitor 2 HDMI-A-1 ; dispatch moveworkspacetomonitor 5 HDMI-A-1 ; dispatch moveworkspacetomonitor 8 HDMI-A-1 ; dispatch moveworkspacetomonitor 3 DP-2 ; dispatch moveworkspacetomonitor 6 DP-2 ; dispatch moveworkspacetomonitor 9 DP-2 ; dispatch moveworkspacetomonitor 10 DP-2 ; dispatch workspace 2"
