# Extra autostart processes
exec-once = hyprpm reload -n
exec-once = signal 
exec-once = teams-for-linux 
exec-once = vicinae server

# Ensure all persistent workspaces are initialized on correct monitors (single batch = atomic, no race conditions)
exec-once = sleep 1 && hyprctl --batch "dispatch workspace 7 ; dispatch workspace 4 ; dispatch workspace 1 ; dispatch workspace 8 ; dispatch workspace 5 ; dispatch workspace 2 ; dispatch workspace 10 ; dispatch workspace 9 ; dispatch workspace 6 ; dispatch workspace 3 ; dispatch workspace 2"
