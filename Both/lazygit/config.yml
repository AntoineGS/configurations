notARepository: skip
gui:
  showDivergenceFromBaseBranch: arrowAndNumber
  theme:
    activeBorderColor:
      - "#cba6f7" # mauve
      - bold
    inactiveBorderColor:
      - "#45475a" # surface1
    searchingActiveBorderColor:
      - "#f9e2af" # yellow
    optionsTextColor:
      - "#89b4fa" # blue
    selectedLineBgColor:
      - "#313244" # surface0
    inactiveViewSelectedLineBgColor:
      - "#6c7086" # overlay0
    cherryPickedCommitFgColor:
      - "#89b4fa" # blue
    cherryPickedCommitBgColor:
      - "#45475a" # surface1
    markedBaseCommitFgColor:
      - "#89b4fa" # blue
    markedBaseCommitBgColor:
      - "#f9e2af" # yellow
    unstagedChangesColor:
      - "#f38ba8" # red
    defaultFgColor:
      - "#cdd6f4" # text
  authorColors:
    "*": "#b4befe" # lavender
git:
  pagers:
    - pager: delta --paging=never
os:
  editPreset: "nvim"
keybinding:
  universal:
    prevPage: "<c-u>"
    nextPage: "<c-d>"
    scrollUpMain: ","
    scrollDownMain: "."
    scrollUpMain-alt2: "<disabled>"
    scrollDownMain-alt2: "<disabled>"
  commits:
    moveDownCommit: "J"
    moveUpCommit: "K"
    openLogMenu: ";"
