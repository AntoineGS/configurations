version: 3
manager_priority:
  - pacman
  - yay
  - paru
  - apt
  - brew
  - winget
applications:
  - package:
      managers:
        installer:
          command:
            linux: curl -fsSL https://claude.ai/install.sh | bash
            windows: irm https://claude.ai/install.ps1 | iex
          binary: claude
    name: claude code
    description: AI assistant CLI
    when: '{{ ne .Distro "ubuntu" }}'
    entries:
      - targets:
          linux: ~/.claude
          windows: ~/.claude
        name: config
        backup: ./Both/ClaudeCode
  - package:
      managers:
        apt: neovim
        brew: neovim
        pacman: neovim
        winget: Neovim.Neovim
    name: neovim
    description: Vim-fork focused on extensibility and usability
    entries:
      - targets:
          linux: ~/.config/nvim
          windows: ~/AppData/Local/nvim
        name: config
        backup: ./Both/Neovim/nvim
      - targets:
          linux: ~/.local/share/nvim/site/spell
          windows: ~/AppData/Local/nvim-data/site/spell
        name: spell
        backup: ./Both/Neovim/spell
        files:
          - en.utf-8.add
  - package:
      managers:
        brew: starship
        pacman: starship
        winget: Starship.Starship
    name: starship
    description: Cross-shell prompt
    entries:
      - targets:
          linux: ~/.config
          windows: ~/.config
        name: config
        backup: ./Both/Starship
        files:
          - starship.toml
      - targets:
          linux: ~/.cache/starship
          windows: ~/.cache/starship
        name: cache
        backup: ./Both/Starship
        files:
          - init.nu
  - package:
      managers:
        brew: nushell
        pacman: nushell
        winget: Nushell.Nushell
    name: nushell
    description: A new type of shell
    when: '{{ eq .Os "windows" }}'
    entries:
      - targets:
          linux: ~/.config/nushell
          windows: ~/AppData/Roaming/nushell
        name: config
        backup: ./Both/Nushell
        files:
          - env.nu
          - config.nu
      - targets:
          linux: ~/.config/nushell/themes
          windows: ~/AppData/Roaming/nushell/themes
        name: themes
        backup: ./Both/Nushell/themes
